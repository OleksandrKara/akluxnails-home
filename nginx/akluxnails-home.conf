# Nginx reverse-proxy config for the akluxnails.com homepage (this repo).
#
# Two server blocks (four including certbot's HTTP->HTTPS redirect pairs):
#   1. preview.akluxnails.com — review subdomain, kept around post-cutover as an internal staging
#      URL (still noindex).
#   2. akluxnails.com / www.akluxnails.com — the real production domain. DNS was cut over from
#      Squarespace to this VPS in Cloudflare (A/AAAA records repointed, old Squarespace A records
#      and the www/_domainconnect CNAMEs removed), and both hostnames are now live here with a
#      real Let's Encrypt certificate.
#
# Both proxy to the akluxnails_home_frontend upstream below — two replicas (blue/green, see
# docker-compose.yml) rather than one, so a rolling deploy (see .github/workflows/deploy.yml)
# never has to take the whole site down: it restarts one replica at a time, and
# proxy_next_upstream below makes nginx silently retry a request against the other replica if the
# one it initially picked is mid-restart, instead of surfacing a connection error to the visitor.
#
# Install (fresh host, before either domain has a cert yet):
#   sudo cp nginx/bot-filter.conf /etc/nginx/conf.d/bot-filter.conf   # defines $blocked_ua/$blocked_ip, used below
#   sudo cp nginx/akluxnails-home.conf /etc/nginx/sites-available/akluxnails-home
#   sudo ln -s /etc/nginx/sites-available/akluxnails-home /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d preview.akluxnails.com
#   sudo certbot --nginx -d akluxnails.com -d www.akluxnails.com
# certbot rewrites this file in place to add each `listen 443 ssl` block, the certificate paths,
# and an HTTP->HTTPS redirect for whichever -d hostnames you pass it — same pattern as
# mani.akluxnails.com and salon.akluxnails.com on this VPS. This checked-in copy already reflects
# those certbot-managed blocks for both preview and production; re-running certbot renews the
# certs in place without needing to touch this file again.

upstream akluxnails_home_frontend {
    server 127.0.0.1:3002 max_fails=1 fail_timeout=3s;
    server 127.0.0.1:3005 max_fails=1 fail_timeout=3s;
}

server {
    server_name preview.akluxnails.com;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Still not the production domain — keep this out of search results under this hostname.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        # See nginx/bot-filter.conf ($blocked_ua/$blocked_ip) — known scraper tools and one
        # browser-spoofing IP that were inflating this page's visitor counts.
        if ($blocked_ua) { return 403; }
        if ($blocked_ip) { return 403; }

        proxy_pass http://akluxnails_home_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # If the replica nginx picked is mid-restart (deploy in progress), silently retry
        # against the other one instead of surfacing a connection error to the visitor.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/preview.akluxnails.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/preview.akluxnails.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = preview.akluxnails.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name preview.akluxnails.com;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot
}

server {
    server_name akluxnails.com www.akluxnails.com;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # No noindex here — this is the real production domain, meant to be crawled/indexed.

    location / {
        # See nginx/bot-filter.conf ($blocked_ua/$blocked_ip) — known scraper tools and one
        # browser-spoofing IP that were inflating this page's visitor counts.
        if ($blocked_ua) { return 403; }
        if ($blocked_ip) { return 403; }

        proxy_pass http://akluxnails_home_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # If the replica nginx picked is mid-restart (deploy in progress), silently retry
        # against the other one instead of surfacing a connection error to the visitor.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/akluxnails.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/akluxnails.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.akluxnails.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = akluxnails.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name akluxnails.com www.akluxnails.com;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot
}
