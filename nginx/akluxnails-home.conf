# Nginx reverse-proxy config for the akluxnails.com homepage (this repo).
#
# Two server blocks in this file, added in two stages:
#   1. preview.akluxnails.com — private review subdomain, added first. HTTP Basic Auth (owner-only)
#      plus X-Robots-Tag: noindex, since this is meant to be reviewed privately before go-live, not
#      publicly crawlable. Requires a `preview` DNS record (A + AAAA) pointed at this VPS in
#      Cloudflare — purely additive, doesn't touch any existing record.
#   2. akluxnails.com / www.akluxnails.com — the real production domain. NOT added here yet;
#      added only once the owner has approved what they see on the preview subdomain, right before
#      the DNS cutover (see the project plan). Currently still pointed at Squarespace.
#
# Install:
#   sudo cp nginx/akluxnails-home.conf /etc/nginx/sites-available/akluxnails-home
#   sudo ln -s /etc/nginx/sites-available/akluxnails-home /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d preview.akluxnails.com
# certbot will rewrite this file in place to add the `listen 443 ssl` block, the certificate
# paths, and an HTTP->HTTPS redirect — same pattern as mani.akluxnails.com and salon.akluxnails.com
# on this VPS. Basic Auth credentials live in /etc/nginx/.htpasswd-akluxnails-preview (not in this
# repo).

server {
    server_name preview.akluxnails.com;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Belt-and-suspenders against accidental indexing — Basic Auth already keeps crawlers out, but
    # this also covers any request that somehow gets through (e.g. a cached response).
    add_header X-Robots-Tag "noindex, nofollow" always;

    auth_basic "Private preview";
    auth_basic_user_file /etc/nginx/.htpasswd-akluxnails-preview;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}
