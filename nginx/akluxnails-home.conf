# Nginx reverse-proxy config for the akluxnails.com homepage (this repo).
#
# Two server blocks in this file:
#   1. preview.akluxnails.com — review subdomain, kept around post-cutover as an internal staging
#      URL (still noindex). Requires a `preview` DNS record (A + AAAA) pointed at this VPS in
#      Cloudflare.
#   2. akluxnails.com / www.akluxnails.com — the real production domain, added once DNS actually
#      points here instead of Squarespace (a Cloudflare-side change only the account owner can
#      make — see the project plan/DNS cutover runbook). This block is inert (no real traffic
#      possible) until that DNS change happens, since Squarespace's origin still serves the
#      hostname until then.
#
# Install:
#   sudo cp nginx/akluxnails-home.conf /etc/nginx/sites-available/akluxnails-home
#   sudo ln -s /etc/nginx/sites-available/akluxnails-home /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d preview.akluxnails.com
#   # Only after DNS for akluxnails.com/www points at this VPS:
#   sudo certbot --nginx -d akluxnails.com -d www.akluxnails.com
# certbot will rewrite this file in place to add the `listen 443 ssl` block, the certificate
# paths, and an HTTP->HTTPS redirect for whichever -d hostnames you pass it — same pattern as
# mani.akluxnails.com and salon.akluxnails.com on this VPS.

server {
    server_name preview.akluxnails.com;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Still not the production domain — keep this out of search results under this hostname.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}

server {
    server_name akluxnails.com www.akluxnails.com;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # No noindex here — this is the real production domain, meant to be crawled/indexed.

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}
